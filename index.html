<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Management</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>User Management</h1>

    <form id="user-form" class="user-form">
      <input type="hidden" id="user-id" />
      <div class="form-group">
        <label for="nickname">Nickname</label>
        <input type="text" id="nickname" placeholder="Enter nickname" required />
      </div>
      <div class="form-group">
        <label for="role">Role</label>
        <input type="text" id="role" placeholder="Enter role" required />
      </div>
      <div class="form-actions">
        <button type="submit" id="submit-btn">Create User</button>
        <button type="button" id="cancel-btn" class="btn-secondary hidden">Cancel</button>
      </div>
    </form>

    <div id="message" class="message hidden"></div>

    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search by nickname..." />
      <button type="button" id="search-btn">Search</button>
      <button type="button" id="clear-search-btn" class="btn-secondary hidden">Clear</button>
    </div>

    <table id="users-table" class="users-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nickname</th>
          <th>Role</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="users-body"></tbody>
    </table>
  </div>

  <script src="js/HttpClient.js"></script>
  <script src="js/UserApi.js"></script>
  <script src="js/UserRenderer.js"></script>
  <script src="js/FormHandler.js"></script>
  <script src="js/MessageService.js"></script>
  <script src="js/App.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
